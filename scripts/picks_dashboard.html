<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Picks Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
  
  .header { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 24px 32px; border-bottom: 1px solid #2a2a4a; }
  .header h1 { font-size: 24px; color: #7c8cf8; letter-spacing: 2px; }
  .header .date { color: #888; font-size: 14px; margin-top: 4px; }
  
  .stats-bar { display: flex; gap: 16px; padding: 20px 32px; background: #0f0f1a; border-bottom: 1px solid #1a1a2e; flex-wrap: wrap; }
  .stat { background: #1a1a2e; border-radius: 8px; padding: 12px 20px; min-width: 120px; }
  .stat .label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
  .stat .value { font-size: 22px; font-weight: bold; color: #7c8cf8; margin-top: 4px; }
  .stat.green .value { color: #4caf82; }
  .stat.red .value { color: #f44336; }
  .stat.gold .value { color: #ffc107; }

  .container { padding: 24px 32px; max-width: 1200px; }
  
  .section-title { font-size: 13px; text-transform: uppercase; letter-spacing: 2px; color: #555; margin-bottom: 16px; margin-top: 24px; }

  .picks-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
  
  .pick-card { background: #1a1a2e; border-radius: 12px; padding: 20px; border: 1px solid #2a2a4a; transition: border-color 0.2s; }
  .pick-card:hover { border-color: #7c8cf8; }
  .pick-card.won { border-left: 4px solid #4caf82; }
  .pick-card.lost { border-left: 4px solid #f44336; }
  .pick-card.pending { border-left: 4px solid #7c8cf8; }

  .pick-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .league-badge { font-size: 11px; background: #2a2a4a; padding: 3px 10px; border-radius: 20px; color: #888; }
  .kickoff { font-size: 12px; color: #555; }

  .match-name { font-size: 16px; font-weight: 600; margin-bottom: 12px; color: #e0e0e0; }

  .pick-details { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .badge { font-size: 12px; padding: 4px 12px; border-radius: 20px; font-weight: 600; }
  .badge.home { background: #1e3a5f; color: #5b9bd5; }
  .badge.away { background: #3a1e1e; color: #d55b5b; }
  .badge.draw { background: #2a2a1e; color: #d5c45b; }
  .badge.conf { background: #1e2a3a; color: #7c8cf8; }

  .odds-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-top: 1px solid #2a2a4a; }
  .odds-label { font-size: 12px; color: #666; }
  .odds-value { font-size: 18px; font-weight: bold; color: #ffc107; }
  
  .kelly-row { display: flex; justify-content: space-between; font-size: 13px; color: #888; margin-top: 4px; }
  .profit { color: #4caf82; font-weight: 600; }

  .result-badge { font-size: 12px; padding: 4px 12px; border-radius: 20px; font-weight: 700; }
  .result-badge.won { background: #1a3a2a; color: #4caf82; }
  .result-badge.lost { background: #3a1a1a; color: #f44336; }
  .result-badge.pending { background: #1a1a3a; color: #7c8cf8; }

  .system-box { background: #1a1a2e; border-radius: 12px; padding: 20px; border: 1px solid #2a2a4a; margin-top: 16px; }
  .system-box h3 { color: #ffc107; margin-bottom: 12px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
  .system-options { display: flex; gap: 12px; flex-wrap: wrap; }
  .system-option { background: #2a2a4a; border-radius: 8px; padding: 12px 16px; flex: 1; min-width: 140px; }
  .system-option .sys-label { font-size: 12px; color: #888; }
  .system-option .sys-value { font-size: 16px; font-weight: bold; color: #e0e0e0; margin-top: 4px; }
  .system-option .sys-profit { font-size: 13px; color: #4caf82; margin-top: 2px; }

  .history-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
  .history-table th { text-align: left; padding: 10px 12px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #555; border-bottom: 1px solid #2a2a4a; }
  .history-table td { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid #1a1a2e; }
  .history-table tr:hover td { background: #1a1a2e; }

  .no-picks { text-align: center; padding: 60px; color: #555; font-size: 16px; }

  @media (max-width: 600px) {
    .header, .stats-bar, .container { padding: 16px; }
    .picks-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>⚽ DAILY PICKS</h1>
  <div class="date" id="current-date"></div>
</div>

<div class="stats-bar">
  <div class="stat green">
    <div class="label">Today's Picks</div>
    <div class="value" id="stat-picks">0</div>
  </div>
  <div class="stat gold">
    <div class="label">Potential Profit</div>
    <div class="value" id="stat-profit">€0</div>
  </div>
  <div class="stat">
    <div class="label">Avg Confidence</div>
    <div class="value" id="stat-conf">0%</div>
  </div>
  <div class="stat green">
    <div class="label">Won (All Time)</div>
    <div class="value" id="stat-won">0</div>
  </div>
  <div class="stat red">
    <div class="label">Lost (All Time)</div>
    <div class="value" id="stat-lost">0</div>
  </div>
  <div class="stat gold">
    <div class="label">Win Rate</div>
    <div class="value" id="stat-winrate">0%</div>
  </div>
</div>

<div class="container">
  <div class="section-title">Today's Picks</div>
  <div class="picks-grid" id="picks-grid">
    <div class="no-picks">Loading picks...</div>
  </div>

  <div class="system-box" id="system-box" style="display:none">
    <h3>📊 System Bet Options</h3>
    <div class="system-options" id="system-options"></div>
  </div>

  <div class="section-title" style="margin-top:32px">History</div>
  <table class="history-table">
    <thead>
      <tr>
        <th>Date</th>
        <th>Match</th>
        <th>Pick</th>
        <th>Odds</th>
        <th>Stake</th>
        <th>Result</th>
        <th>P/L</th>
      </tr>
    </thead>
    <tbody id="history-body">
      <tr><td colspan="7" style="text-align:center;color:#555;padding:20px">No history yet</td></tr>
    </tbody>
  </table>
</div>

<script>
// ─── Load today's picks from JSON ─────────────────────────────────────────
async function loadPicks() {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('current-date').textContent = new Date().toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long', year:'numeric'});

  let data = null;
  try {
    const res = await fetch(`../artifacts/daily_picks_${today}.json`);
    if (res.ok) data = await res.json();
  } catch(e) {}

  // fallback: try loading from embedded data
  if (!data) {
    data = window.PICKS_DATA || null;
  }

  if (!data || !data.picks || data.picks.length === 0) {
    document.getElementById('picks-grid').innerHTML = '<div class="no-picks">No picks available for today.<br><small>Run: python scripts/daily_picks.py</small></div>';
    return;
  }

  renderPicks(data.picks);
  renderStats(data.picks);
  renderSystem(data.picks);
  loadHistory();
}

function selectionLabel(sel) {
  return {home_win:'HOME', away_win:'AWAY', draw:'DRAW'}[sel] || sel;
}

function selectionClass(sel) {
  return {home_win:'home', away_win:'away', draw:'draw'}[sel] || 'conf';
}

function renderPicks(picks) {
  const grid = document.getElementById('picks-grid');
  if (!picks.length) {
    grid.innerHTML = '<div class="no-picks">No confident picks today.</div>';
    return;
  }

  grid.innerHTML = picks.map((p, i) => {
    const sel = selectionLabel(p.selection);
    const selCls = selectionClass(p.selection);
    const conf = (p.confidence || 0).toFixed(1);
    const odds = p.odds || {};
    const selKey = {home_win:'home', away_win:'away', draw:'draw'}[p.selection] || '';
    const realOdds = odds[selKey] || 0;
    const oddsStr = realOdds > 1 ? realOdds.toFixed(2) : 'N/A';
    const result = p.result || 'pending';
    const kickoff = p.kickoff ? new Date(p.kickoff).toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'}) : '';

    const prob = p.confidence / 100;
    const stake = realOdds > 1 ? kellyStake(prob, realOdds) : 0;
    const profit = stake > 0 ? (stake * (realOdds - 1)).toFixed(2) : '0.00';

    return `
    <div class="pick-card ${result}">
      <div class="pick-header">
        <span class="league-badge">${p.league || ''}</span>
        <span class="kickoff">${kickoff}</span>
      </div>
      <div class="match-name">${p.home} vs ${p.away}</div>
      <div class="pick-details">
        <span class="badge ${selCls}">${sel}</span>
        <span class="badge conf">${conf}% conf</span>
        <span class="result-badge ${result}">${result.toUpperCase()}</span>
      </div>
      <div class="odds-row">
        <span class="odds-label">Odds</span>
        <span class="odds-value">${oddsStr}</span>
      </div>
      <div class="kelly-row">
        <span>Kelly stake: €${stake.toFixed(2)}</span>
        <span class="profit">Profit: €${profit}</span>
      </div>
    </div>`;
  }).join('');
}

function kellyStake(prob, odds, bankroll=100) {
  if (odds <= 1) return 0;
  const b = odds - 1;
  const q = 1 - prob;
  const kelly = (b * prob - q) / b;
  return Math.max(0, kelly * 0.25 * bankroll);
}

function renderStats(picks) {
  const totalProfit = picks.reduce((sum, p) => {
    const odds = p.odds || {};
    const selKey = {home_win:'home', away_win:'away', draw:'draw'}[p.selection] || '';
    const realOdds = odds[selKey] || 0;
    if (realOdds <= 1) return sum;
    const prob = p.confidence / 100;
    const stake = kellyStake(prob, realOdds);
    return sum + stake * (realOdds - 1);
  }, 0);

  const avgConf = picks.reduce((s, p) => s + p.confidence, 0) / picks.length;

  document.getElementById('stat-picks').textContent = picks.length;
  document.getElementById('stat-profit').textContent = `€${totalProfit.toFixed(0)}`;
  document.getElementById('stat-conf').textContent = `${avgConf.toFixed(0)}%`;

  // history stats
  const history = JSON.parse(localStorage.getItem('picks_history') || '[]');
  const won = history.filter(h => h.result === 'won').length;
  const lost = history.filter(h => h.result === 'lost').length;
  const total = won + lost;
  document.getElementById('stat-won').textContent = won;
  document.getElementById('stat-lost').textContent = lost;
  document.getElementById('stat-winrate').textContent = total > 0 ? `${(won/total*100).toFixed(0)}%` : '0%';
}

function renderSystem(picks) {
  if (picks.length < 3) return;
  const box = document.getElementById('system-box');
  const opts = document.getElementById('system-options');
  box.style.display = 'block';

  const n = picks.length;
  const systems = [];
  if (n >= 3) systems.push({label: `${n-1} of ${n}`, desc: 'Conservative'});
  if (n >= 4) systems.push({label: `${n-2} of ${n}`, desc: 'Balanced'});
  if (n >= 5) systems.push({label: `${n-3} of ${n}`, desc: 'Aggressive'});

  opts.innerHTML = systems.map(s => `
    <div class="system-option">
      <div class="sys-label">${s.desc}</div>
      <div class="sys-value">${s.label}</div>
      <div class="sys-profit">System bet</div>
    </div>
  `).join('');
}

function loadHistory() {
  const history = JSON.parse(localStorage.getItem('picks_history') || '[]');
  const tbody = document.getElementById('history-body');
  if (!history.length) return;

  tbody.innerHTML = history.slice().reverse().map(h => `
    <tr>
      <td>${h.date}</td>
      <td>${h.home} vs ${h.away}</td>
      <td><span class="badge ${selectionClass(h.selection)}">${selectionLabel(h.selection)}</span></td>
      <td>${h.odds || 'N/A'}</td>
      <td>€${h.stake || 0}</td>
      <td><span class="result-badge ${h.result}">${h.result.toUpperCase()}</span></td>
      <td class="${h.pl >= 0 ? 'profit' : ''}" style="${h.pl < 0 ? 'color:#f44336' : ''}">${h.pl >= 0 ? '+' : ''}€${h.pl || 0}</td>
    </tr>
  `).join('');
}

loadPicks();
</script>
</body>
</html>
