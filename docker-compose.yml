services:
  worldcup-gui:
    build: .
    container_name: worldcup-predictor-gui
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      # Bind to localhost only — put Nginx in front for public access.
      - "127.0.0.1:8501:8501"
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
      - ./reports:/app/reports
      - ./.cache:/app/.cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8501/_stcore/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
